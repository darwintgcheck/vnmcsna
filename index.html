<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#08080d" />
    <meta name="description" content="King Casino - Telegram Stars ilə oyun oynayın" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <title>King Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
      }

      body {
        background: #08080d;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
        line-height: 1.5;
      }

      #root {
        width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .loading-screen,
      .error-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #08080d 0%, #0f0f1a 100%);
        flex-direction: column;
        text-align: center;
        padding: 20px;
        gap: 20px;
      }

      .loading-screen h1,
      .error-screen h1 {
        font-size: 24px;
        margin: 0;
        background: linear-gradient(90deg, #8c62ff, #5ee7ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .error-screen {
        color: #ff8080;
      }

      .error-screen p {
        margin: 0;
        opacity: 0.8;
        max-width: 500px;
        font-size: 14px;
      }

      .error-screen small {
        display: block;
        margin-top: 20px;
        opacity: 0.5;
        font-size: 12px;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #8c62ff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen" id="init-loading">
        <div class="spinner"></div>
        <h1>King Casino</h1>
        <p>Yüklənir...</p>
      </div>
    </div>

    <script type="module" src="/src/index.tsx"></script>

    <script>
      window.addEventListener('error', (event) => {
        console.error('❌ Error:', event.error);
        const root = document.getElementById('root');
        if (root && root.innerHTML.includes('init-loading')) {
          root.innerHTML = `
            <div class="error-screen">
              <h1>⚠️ Xəta baş verdi</h1>
              <p>${event.error?.message || 'Bilinməyən xəta'}</p>
              <small>Səhifəni yeniləməyi cəhd edin (F5)</small>
            </div>
          `;
        }
      });

      window.addEventListener('unhandledrejection', (event) => {
        console.error('❌ Promise Rejection:', event.reason);
        const root = document.getElementById('root');
        if (root && root.innerHTML.includes('init-loading')) {
          root.innerHTML = `
            <div class="error-screen">
              <h1>⚠️ Əməliyyat xətası</h1>
              <p>${event.reason?.message || String(event.reason) || 'Bilinməyən xəta'}</p>
              <small>Console-u açıb xətanı yoxla</small>
            </div>
          `;
        }
      });
    </script>
  </body>
</html>
